<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI网文小说生成器</title>
    
    <!-- Google Fonts - Inter -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <!-- Bootstrap 5 CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <!-- Bootstrap Icons -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.10.0/font/bootstrap-icons.css" rel="stylesheet">
    <!-- Highlight.js (代码高亮) -->
    <link href="https://cdn.jsdelivr.net/npm/highlight.js@11.9.0/styles/github-dark.min.css" rel="stylesheet">
    <!-- 自定义样式 -->
    <link href="css/style.css" rel="stylesheet">
</head>
<body>
    <!-- 顶部导航栏 -->
    <nav class="navbar navbar-expand-lg">
        <div class="container-fluid">
            <a class="navbar-brand" href="/">
                <div class="brand-icon">
                    <i class="bi bi-stars"></i>
                </div>
                <span class="brand-text">AI小说工坊</span>
            </a>
            <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav">
                <span class="navbar-toggler-icon"></span>
            </button>
            <div class="collapse navbar-collapse" id="navbarNav">
                <ul class="navbar-nav me-auto">
                    <li class="nav-item">
                        <a class="nav-link" href="/" id="nav-projects" onclick="event.preventDefault(); App.goToProjects();">
                            <i class="bi bi-folder2"></i> 项目管理
                        </a>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link" href="#" id="nav-models" onclick="event.preventDefault(); App.showModelSettings();">
                            <i class="bi bi-cpu"></i> 模型设置
                        </a>
                    </li>
                </ul>
                <div class="d-flex align-items-center gap-3">
                    <div class="model-indicator" id="current-model-name" onclick="App.showModelSettings()" title="点击配置模型">
                        <div class="model-dot"></div>
                        <span class="model-label">未配置模型</span>
                        <i class="bi bi-chevron-down"></i>
                    </div>
                    <button class="btn-icon" id="btn-help" title="帮助">
                        <i class="bi bi-question-circle"></i>
                    </button>
                </div>
            </div>
        </div>
    </nav>

    <!-- 主内容区 -->
    <div class="main-container">
        <!-- 侧边栏切换按钮 -->
        <button class="sidebar-toggle-btn" id="btn-toggle-sidebar" title="切换侧边栏">
            <i class="bi bi-chevron-left"></i>
        </button>
        
        <!-- 可折叠左侧边栏 -->
        <aside class="sidebar" id="sidebar">
            <div class="sidebar-content">
                <!-- 项目信息 -->
                <div class="sidebar-section" id="project-info">
                    <div class="empty-state">
                        <div class="empty-icon">
                            <i class="bi bi-folder2-open"></i>
                        </div>
                        <p>请选择或创建项目</p>
                    </div>
                </div>
                
                <!-- 大纲管理 -->
                <div class="sidebar-section" id="outline-section" style="display: none;">
                    <div class="section-header">
                        <div class="section-icon"><i class="bi bi-list-ul"></i></div>
                        <span>大纲管理</span>
                    </div>
                    <div class="section-body">
                        <button class="sidebar-btn" id="btn-outline-editor">
                            <i class="bi bi-pencil-square"></i> 编辑大纲
                        </button>
                        <button class="sidebar-btn secondary" id="btn-outline-versions">
                            <i class="bi bi-clock-history"></i> 版本历史
                        </button>
                    </div>
                </div>
                
                <!-- 章节管理 -->
                <div class="sidebar-section" id="chapter-section" style="display: none;">
                    <div class="section-header">
                        <div class="section-icon"><i class="bi bi-file-text"></i></div>
                        <span>章节管理</span>
                    </div>
                    <div class="section-body">
                        <div id="chapter-list" class="chapter-list">
                            <!-- 章节列表将动态生成 -->
                        </div>
                        <button class="sidebar-btn primary" id="btn-add-chapter">
                            <i class="bi bi-plus-lg"></i> 添加章节
                        </button>
                    </div>
                </div>
                
                <!-- 角色管理 -->
                <div class="sidebar-section" id="character-section" style="display: none;">
                    <div class="section-header">
                        <div class="section-icon"><i class="bi bi-people"></i></div>
                        <span>角色管理</span>
                    </div>
                    <div class="section-body">
                        <button class="sidebar-btn" id="btn-characters">
                            <i class="bi bi-person-lines-fill"></i> 角色列表
                        </button>
                        <button class="sidebar-btn secondary" id="btn-mindmap">
                            <i class="bi bi-diagram-3"></i> 关系脑图
                        </button>
                    </div>
                </div>
                
                <!-- 导入/导出 -->
                <div class="sidebar-section" id="import-export-section">
                    <div class="section-header">
                        <div class="section-icon"><i class="bi bi-arrow-left-right"></i></div>
                        <span>导入 / 导出</span>
                    </div>
                    <div class="section-body">
                        <button class="sidebar-btn success" id="btn-import">
                            <i class="bi bi-cloud-upload"></i> 导入小说
                        </button>
                        <button class="sidebar-btn info" id="btn-export">
                            <i class="bi bi-cloud-download"></i> 导出作品
                        </button>
                    </div>
                </div>
            </div>
        </aside>

        <!-- 主工作区 -->
        <main class="main-content" id="main-content">
            <!-- 默认欢迎界面 -->
            <div class="welcome-screen" id="welcome-screen">
                <div class="welcome-content">
                    <div class="welcome-icon">
                        <i class="bi bi-stars"></i>
                    </div>
                    <h1>AI小说工坊</h1>
                    <p class="welcome-subtitle">智能创作，无限可能</p>
                    <p class="welcome-desc">创建一个新项目或选择已有项目开始创作</p>
                    <button class="btn-primary-custom" id="btn-create-novel">
                        <i class="bi bi-plus-circle"></i> 创建新项目
                    </button>
                </div>
                <div class="welcome-bg-shapes">
                    <div class="shape shape-1"></div>
                    <div class="shape shape-2"></div>
                    <div class="shape shape-3"></div>
                </div>
            </div>
            
            <!-- 项目工作区（默认隐藏） -->
            <div class="workspace" id="workspace" style="display: none;">
                <!-- 步骤指示条 -->
                <div class="steps-bar" id="steps-bar">
                    <div class="step active" data-step="outline">
                        <span class="step-number">1</span>
                        <span class="step-text">大纲</span>
                        <span class="step-line"></span>
                    </div>
                    <div class="step" data-step="detail">
                        <span class="step-number">2</span>
                        <span class="step-text">细纲/事件链</span>
                        <span class="step-line"></span>
                    </div>
                    <div class="step" data-step="characters">
                        <span class="step-number">3</span>
                        <span class="step-text">角色</span>
                        <span class="step-line"></span>
                    </div>
                    <div class="step" data-step="chapters">
                        <span class="step-number">4</span>
                        <span class="step-text">章节正文</span>
                    </div>
                </div>
                
                <!-- 工作区内容 -->
                <div class="workspace-content" id="workspace-content">
                    <!-- 内容将根据步骤动态切换 -->
                </div>
            </div>
        </main>
    </div>

    <!-- 底部状态栏 -->
    <footer class="status-bar" id="status-bar">
        <div class="status-item">
            <i class="bi bi-file-text"></i>
            <span>总字数 <strong id="total-words">0</strong></span>
        </div>
        <div class="status-divider"></div>
        <div class="status-item">
            <i class="bi bi-check-circle"></i>
            <span>已完成 <strong id="completed-chapters">0</strong> 章</span>
        </div>
        <div class="status-divider"></div>
        <div class="status-item">
            <i class="bi bi-percent"></i>
            <span>完成度 <strong id="completion-rate">0%</strong></span>
        </div>
        <div class="status-divider"></div>
        <div class="status-item">
            <i class="bi bi-clock"></i>
            <span>今日 <strong id="writing-time">0分钟</strong></span>
        </div>
    </footer>

    <!-- 模态框容器 -->
    <div class="modal fade" id="mainModal" tabindex="-1">
        <div class="modal-dialog modal-lg modal-modern">
            <div class="modal-content">
                <div class="modal-header">
                    <h5 class="modal-title" id="modal-title">标题</h5>
                    <button type="button" class="btn-close-modern" data-bs-dismiss="modal">
                        <i class="bi bi-x-lg"></i>
                    </button>
                </div>
                <div class="modal-body" id="modal-body">
                    内容
                </div>
                <div class="modal-footer" id="modal-footer">
                    <button type="button" class="btn-modern secondary" data-bs-dismiss="modal">关闭</button>
                </div>
            </div>
        </div>
    </div>

    <!-- Bootstrap 5 JS -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <!-- Axios -->
    <script src="https://cdn.jsdelivr.net/npm/axios/dist/axios.min.js"></script>
    <!-- ECharts -->
    <script src="https://cdn.jsdelivr.net/npm/echarts/dist/echarts.min.js"></script>
    <!-- Marked.js (Markdown渲染) -->
    <script src="https://cdn.jsdelivr.net/npm/marked@12.0.0/marked.min.js"></script>
    <!-- DOMPurify (XSS防护) -->
    <script src="https://cdn.jsdelivr.net/npm/dompurify@3.0.8/dist/purify.min.js"></script>
    <!-- Highlight.js (代码高亮) -->
    <script src="https://cdn.jsdelivr.net/npm/highlight.js@11.9.0/highlight.min.js"></script>
    
    <!-- 自定义JS -->
    <script src="js/utils/stateManager.js"></script>
    <script src="js/utils/markdownRenderer.js"></script>
    <script src="js/api.js"></script>
    <script src="js/components/projectManager.js"></script>
    <script src="js/components/statsBar.js"></script>
    <script src="js/app.js"></script>
</body>
</html>
